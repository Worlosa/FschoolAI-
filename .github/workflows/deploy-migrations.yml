name: Deploy NeuroOS Schema to Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-migrations.yml'
  workflow_dispatch:

env:
  SUPABASE_URL: https://vanzrpqmkmqgsbjdnfvj.supabase.co
  SUPABASE_PROJECT_ID: vanzrpqmkmqgsbjdnfvj

jobs:
  deploy:
    name: Deploy Migrations
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install Supabase CLI
        run: npm install -g supabase
      
      - name: Verify migrations
        run: |
          echo "📊 Migration files:"
          ls -la supabase/migrations/ || echo "No migrations yet"
      
      - name: Deploy to Supabase
        run: |
          echo "🚀 Deploying NeuroOS schema to Supabase..."
          supabase link --project-ref ${{ env.SUPABASE_PROJECT_ID }}
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      
      - name: Verify deployment
        run: |
          echo "✅ Deployment complete!"
          echo "Schema deployed to: ${{ env.SUPABASE_URL }}"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs above for details"
