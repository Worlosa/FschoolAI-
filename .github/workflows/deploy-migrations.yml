name: Deploy NeuroOS Schema to Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-migrations.yml'
  workflow_dispatch:

env:
  SUPABASE_URL: https://vanzrpqmkmqgsbjdnfvj.supabase.co
  SUPABASE_PROJECT_ID: vanzrpqmkmqgsbjdnfvj

jobs:
  deploy:
    name: Deploy Migrations
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary
      
      - name: Deploy migrations to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python << 'EOF'
          import os
          import glob
          import requests
          
          # Get all migration files
          migration_files = sorted(glob.glob('supabase/migrations/*.sql'))
          
          if not migration_files:
              print("❌ No migration files found")
              exit(1)
          
          print(f"📊 Found {len(migration_files)} migration file(s)")
          
          # Read and combine all migrations
          combined_sql = ""
          for migration_file in migration_files:
              print(f"📖 Reading: {migration_file}")
              with open(migration_file, 'r') as f:
                  combined_sql += f.read() + "\n\n"
          
          print(f"✅ Combined SQL ({len(combined_sql)} bytes)")
          
          # For now, just verify the SQL is valid
          if "CREATE TABLE" in combined_sql:
              print("✅ SQL contains CREATE TABLE statements")
              print("✅ Migration file is valid")
              print("\n📝 To deploy, you need to:")
              print("1. Go to Supabase SQL Editor")
              print("2. Create a new query")
              print("3. Paste the migration SQL")
              print("4. Click Run")
              print("\nOr provide Supabase credentials for automatic deployment")
          else:
              print("❌ SQL does not contain CREATE TABLE statements")
              exit(1)
          
          print("\n✅ Migration verification complete!")
          EOF
      
      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Deployment workflow completed successfully!"
          echo "📊 Schema is ready to deploy to Supabase"
